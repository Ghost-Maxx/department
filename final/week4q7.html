<!DOCTYPE html>
<html>
<head>
    <title>Image Layout</title>
    <style>
        .container {
            position: relative;
            width: 700px;
            height: 700px;
        }

        .img1 {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .img2 {
            position: absolute;
            top: 200px;
            left: 200px;
        }

        .img3 {
            position: absolute;
            top: 400px;
            left: 400px;
        }
    </style>
</head>

<body>

<table border="1" align="center">
    <tr>
        <td>
            <div class="container">
                <img src="OIP.jpg" class="img1" width="150" height="150">
                <img src="snape.jpg" class="img2" width="150" height="150">
                <img src="download.jpg" class="img3" width="150" height="150">
            </div>
        </td>
    </tr>
</table>

<p style="text-align:center;">Figure. 1</p>

</body>
</html>
