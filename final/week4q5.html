<!DOCTYPE html>
<html>
<head>
    <title>Table Layout</title>
</head>
<body>

<table border="1" align="center" cellspacing="0" cellpadding="10">
    <tr align="center">
        <td>1</td>
        <td>2</td>
        <td>3</td>
        <td>4</td>
    </tr>
    <tr align="center">
        <td>5</td>
        <td rowspan="2" colspan="2" align="center"width="300">
            <img src="snape.jpg" alt="Snape" width="150">
        </td>
        <td>6</td>
    </tr>
    <tr align="center">
        <td>7</td>
        <td>8</td>
    </tr>
    <tr align="center">
        <td>9</td>
        <td>10</td>
        <td>11</td>
        <td>12</td>
    </tr>
</table>

</body>
</html>
